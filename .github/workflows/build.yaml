name: PlatformIO CI

on: [push]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run

      - name: Convert to bin
        run: |
          $HOME/.platformio/packages/toolchain-atmelavr/bin/avr-objcopy -O binary ".pio/build/ATmega48P/firmware.elf" firmware_ATmega48P.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: firmware_*.bin

      - name: Update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: mt
          files: firmware_*.bin